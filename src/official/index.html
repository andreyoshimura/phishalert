<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PhishAlert - Acesso Oficial</title>
    <meta name="description" content="Página oficial local do PhishAlert." />
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --panel: #fff;
        --text: #102033;
        --muted: #5f6d7c;
        --border: #d9e2ef;
        --accent: #0b5fff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(460px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 28px;
      }

      .badge {
        display: inline-block;
        margin-bottom: 14px;
        padding: 6px 10px;
        border-radius: 999px;
        background: #e9f0ff;
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.9rem;
        line-height: 1.1;
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.6;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.93rem;
        font-weight: 700;
      }

      input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px 12px;
        margin-bottom: 12px;
        font: inherit;
      }

      input:focus {
        outline: 2px solid #cfe0ff;
        border-color: #9ab7ff;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 14px 18px;
        background: var(--accent);
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .footer {
        margin-top: 16px;
        font-size: 0.92rem;
        color: var(--muted);
      }
    </style>
    <script>
      (() => {
        const ENDPOINT = "/api/events";

        function getToken() {
          try {
            return new URL(window.location.href).searchParams.get("token") || "";
          } catch {
            return "";
          }
        }

        function send(payload) {
          const body = JSON.stringify(payload);
          const blob = new Blob([body], { type: "application/json" });
          if (navigator.sendBeacon && navigator.sendBeacon(ENDPOINT, blob)) return;
          fetch(ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body,
            keepalive: true,
          }).catch(() => {});
        }

        function capturePageView() {
          send({
            event_type: "official_page_view",
            page_url: window.location.href,
            referrer: document.referrer || "",
            campaign_token: getToken(),
            user_agent: navigator.userAgent || "",
            language: navigator.language || "",
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "",
            timestamp: new Date().toISOString(),
          });
        }

        window.addEventListener("DOMContentLoaded", capturePageView);
      })();
    </script>
  </head>
  <body>
    <main class="card">
      <div class="badge">Página Oficial</div>
      <h1>Acesso ao PhishAlert</h1>
      <p>Ambiente oficial local para testes.</p>

      <form autocomplete="off">
        <label for="username">Usuário</label>
        <input id="username" name="username" type="text" />

        <label for="password">Senha</label>
        <input id="password" name="password" type="password" />

        <button type="button">Entrar</button>
      </form>

      <div class="footer">Página oficial ativa para testes.</div>
    </main>
  </body>
</html>
